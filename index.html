<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wallet | 財務管理中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f13;
            --surface: #18181f;
            --surface2: #1e1e28;
            --border: rgba(255,255,255,0.07);
            --text: #e8e8f0;
            --muted: #666680;
            --accent-stock: #7c6fea;
            --accent-stock-glow: rgba(124, 111, 234, 0.3);
            --accent-card: #3ab4f2;
            --accent-card-glow: rgba(58, 180, 242, 0.3);
            --accent-gold: #f0b429;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Background ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
        }

        .glow-purple {
            background: var(--accent-stock);
            top: -200px;
            left: -200px;
        }

        .glow-blue {
            background: var(--accent-card);
            bottom: -200px;
            right: -200px;
        }

        /* ── Layout ── */
        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ── Header ── */
        header {
            padding: 56px 0 32px;
            text-align: center;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, var(--accent-stock) 0%, var(--accent-card) 100%);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 24px;
            box-shadow: 0 0 40px rgba(124, 111, 234, 0.4);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        header h1 {
            font-size: clamp(28px, 5vw, 42px);
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, var(--muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--muted);
            font-size: 15px;
            margin-top: 10px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        /* ── Cards Grid ── */
        .cards-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 48px 0 32px;
        }

        @media (max-width: 600px) {
            .cards-grid { grid-template-columns: 1fr; }
        }

        .hub-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px;
            text-decoration: none;
            color: var(--text);
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                        border-color 0.3s ease,
                        box-shadow 0.3s ease;
            cursor: pointer;
        }

        .hub-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.3s ease;
            border-radius: 20px;
        }

        .hub-card:hover {
            transform: translateY(-6px);
        }

        .hub-card:hover::before { opacity: 1; }

        /* Stock card */
        .card-stock {
            border-color: rgba(124, 111, 234, 0.2);
        }
        .card-stock::before {
            background: radial-gradient(ellipse at top left, rgba(124, 111, 234, 0.08) 0%, transparent 70%);
        }
        .card-stock:hover {
            border-color: rgba(124, 111, 234, 0.5);
            box-shadow: 0 20px 60px rgba(124, 111, 234, 0.15);
        }

        /* Credit card */
        .card-credit {
            border-color: rgba(58, 180, 242, 0.2);
        }
        .card-credit::before {
            background: radial-gradient(ellipse at top left, rgba(58, 180, 242, 0.08) 0%, transparent 70%);
        }
        .card-credit:hover {
            border-color: rgba(58, 180, 242, 0.5);
            box-shadow: 0 20px 60px rgba(58, 180, 242, 0.15);
        }

        .card-icon-wrap {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .icon-stock {
            background: linear-gradient(135deg, rgba(124,111,234,0.25), rgba(124,111,234,0.08));
            color: var(--accent-stock);
            border: 1px solid rgba(124,111,234,0.3);
        }

        .icon-credit {
            background: linear-gradient(135deg, rgba(58,180,242,0.25), rgba(58,180,242,0.08));
            color: var(--accent-card);
            border: 1px solid rgba(58,180,242,0.3);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .card-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: auto;
        }

        .tag {
            font-size: 11px;
            font-weight: 500;
            padding: 4px 10px;
            border-radius: 100px;
            letter-spacing: 0.3px;
        }

        .tag-stock {
            background: rgba(124,111,234,0.12);
            color: #a89cf0;
            border: 1px solid rgba(124,111,234,0.2);
        }

        .tag-credit {
            background: rgba(58,180,242,0.12);
            color: #6dcaf7;
            border: 1px solid rgba(58,180,242,0.2);
        }

        .card-arrow {
            position: absolute;
            top: 28px;
            right: 28px;
            font-size: 14px;
            opacity: 0.25;
            transition: opacity 0.3s, transform 0.3s;
        }

        .hub-card:hover .card-arrow {
            opacity: 0.7;
            transform: translate(2px, -2px);
        }

        /* ── Stats row ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 48px;
        }

        @media (max-width: 500px) {
            .stats-row { grid-template-columns: 1fr; gap: 8px; }
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 20px;
            text-align: center;
        }

        .stat-icon {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 32px 0 48px;
            color: var(--muted);
            font-size: 12px;
        }

        footer span {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 0 0 40px;
        }

        /* ── Ripple on click ── */
        .hub-card:active {
            transform: translateY(-3px) scale(0.99);
        }

        /* ── Version badge ── */
        .version-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 4px 12px;
            font-size: 11px;
            color: var(--muted);
            margin-top: 14px;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow glow-purple"></div>
    <div class="bg-glow glow-blue"></div>

    <div class="container">
        <header>
            <div class="logo-icon">💰</div>
            <h1>My Wallet</h1>
            <p>個人財務管理中心</p>
            <div class="version-badge">
                <div class="pulse-dot"></div>
                <span>線上運作中</span>
            </div>
        </header>

        <div class="cards-grid">
            <!-- 股票資產 -->
            <a href="mystock" class="hub-card card-stock">
                <i class="fa-solid fa-chevron-right card-arrow"></i>
                <div class="card-icon-wrap icon-stock">
                    <i class="fa-solid fa-chart-line"></i>
                </div>
                <div>
                    <div class="card-title">投資組合</div>
                    <div class="card-desc" style="margin-top: 8px;">追蹤台股、美股庫存，即時損益、歷史淨值走勢與資產配置分析。</div>
                </div>
                <div class="card-tags">
                    <span class="tag tag-stock">台股</span>
                    <span class="tag tag-stock">美股</span>
                    <span class="tag tag-stock">損益追蹤</span>
                    <span class="tag tag-stock">Fear & Greed</span>
                </div>
            </a>

            <!-- 信用卡 -->
            <a href="mycreditcard" class="hub-card card-credit">
                <i class="fa-solid fa-chevron-right card-arrow"></i>
                <div class="card-icon-wrap icon-credit">
                    <i class="fa-solid fa-credit-card"></i>
                </div>
                <div>
                    <div class="card-title">卡片管家</div>
                    <div class="card-desc" style="margin-top: 8px;">管理信用卡消費記錄、回饋計算、帳單追蹤與刷卡優化建議。</div>
                </div>
                <div class="card-tags">
                    <span class="tag tag-credit">消費記錄</span>
                    <span class="tag tag-credit">現金回饋</span>
                    <span class="tag tag-credit">帳單管理</span>
                </div>
            </a>
        </div>

        <div class="divider"></div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-label">模組數量</div>
                <div class="stat-value">2 個</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">☁️</div>
                <div class="stat-label">資料儲存</div>
                <div class="stat-value">Firebase</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔒</div>
                <div class="stat-label">登入方式</div>
                <div class="stat-value">Google 帳號</div>
            </div>
        </div>

        <footer>
            <span>
                <i class="fa-solid fa-lock" style="font-size: 10px;"></i>
                資料加密儲存於個人 Firebase 帳戶，僅限本人存取
            </span>
        </footer>
    </div>
</body>
</html>
